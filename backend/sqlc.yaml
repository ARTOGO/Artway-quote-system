version: "2"

sql:
  - engine: "postgresql"
    queries: "internal/quotes/queries.sql"
    schema: "migrations"
    gen:
      go:
        package: "quotesdb"
        out: "internal/quotes/sqlcgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        # uuid 用 google/uuid（不要 pgtype.UUID，handler 層比較直觀）
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
            nullable: true
